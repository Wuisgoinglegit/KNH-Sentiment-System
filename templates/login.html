<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNH - Login</title> 

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='knh-logo-transparent.png') }}">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: #87CEEC;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .login-card {
            background-color: #FFFFFF;
            width: 100%;
            max-width: 400px;
            padding: 40px 32px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 16, 46, 0.15);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-logo img {
            height: 80px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .login-header h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #00102E;
        }

        .login-header p {
            font-size: 14px;
            color: #444;
            font-weight: bold;
        }

        .message {
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .success-msg {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .error-msg {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-control {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            background-color: #fcfcfc;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            font-size: 14px;
            color: #555;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #00102E;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-submit:hover {
            background-color: #002366;
        }

        .login-footer {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 20px;
        }

        .login-footer a {
            color: #00102E;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="login-card">

        <div class="login-logo">
            <img src="{{ url_for('static', filename='knh-logo-transparent.png') }}" alt="KNH Logo">
        </div>

        <div class="login-header">
            <h2>Sign In</h2>
            <p>Enter your credentials to continue</p>
        </div>

        {% if success_msg %}
            <div class="message success-msg">
                {{ success_msg }}
            </div>
        {% endif %}

        {% if error_msg %}
            <div class="message error-msg">
                {{ error_msg }}
            </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="form-group">
                <input type="text" name="staffId" class="form-control" placeholder="Staff ID" required>
            </div>

            <div class="form-group">
                <input type="password" id="login_password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <label class="checkbox-group">
                <input type="checkbox" onclick="toggleLoginPassword()"> Show Password
            </label>

            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <div class="login-footer">
            Don't have an account? <a href="/register">Create here</a>
        </div>
    </div>

    <script>
        function toggleLoginPassword() {
            var x = document.getElementById("login_password");
            x.type = (x.type === "password") ? "text" : "password";
        }
    </script>

</body>
</html>
