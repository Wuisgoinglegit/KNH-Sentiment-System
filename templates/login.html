<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNH | Staff Login</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='knh-logo-transparent.png') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        /* Restored the sky blue background to match the forgot password page */
        body { background-color: #87CEEC; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-card { background: #FFFFFF; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0, 16, 46, 0.1); width: 100%; max-width: 400px; text-align: center; }
        .auth-card img { height: 70px; margin-bottom: 20px; }
        .auth-card h2 { color: #00102E; margin-bottom: 20px; }
        .form-control { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #E2E8F0; border-radius: 6px; font-size: 15px; }
        .btn-submit { width: 100%; padding: 12px; background: #00102E; color: #FFFFFF; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-bottom: 15px; }
        .btn-submit:hover { background: #002366; }
        .alert { padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; font-weight: bold; }
        .alert-error { background: #fee2e2; color: #991b1b; }
        .alert-success { background: #dcfce7; color: #166534; }
        a { color: #87CEEC; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="{{ url_for('static', filename='kenyatta-national-hospital-seeklogo.png') }}" alt="KNH Logo">
        <h2>Staff Portal Login</h2>
        
        {% if error_msg %} <div class="alert alert-error">{{ error_msg }}</div> {% endif %}
        {% if success_msg %} <div class="alert alert-success">{{ success_msg }}</div> {% endif %}

        <form action="/login" method="POST">
            <input type="text" name="staffId" class="form-control" placeholder="Staff ID (e.g., ADM-123)" required>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            <button type="submit" class="btn-submit">Secure Login</button>
        </form>
        
        <p style="font-size: 14px; color: #666;"><a href="/forgot">Forgot Password?</a></p>
    </div>
</body>
</html>
