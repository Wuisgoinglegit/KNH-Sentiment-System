<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNH | Staff Login</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='knh-logo-transparent.png') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        /* Light Blue Background */
        body { background-color: #87CEEC; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: #FFFFFF; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,16,46,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid #00102E; }
        .auth-card img { height: 70px; margin-bottom: 20px; transition: 0.3s; }
        .auth-card h2 { color: #00102E; margin-bottom: 25px; font-size: 24px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; color: #666; margin-bottom: 8px; text-transform: uppercase; }
        .form-control { width: 100%; padding: 12px 15px; border: 1px solid #E2E8F0; border-radius: 8px; font-size: 15px; outline: none; transition: 0.3s; }
        .form-control:focus { border-color: #87CEEC; box-shadow: 0 0 0 3px rgba(135,206,236,0.3); }
        .btn-auth { background: #00102E; color: #fff; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-auth:hover { background: #002366; }
        .auth-links { margin-top: 20px; font-size: 14px; }
        .auth-links a { color: #87CEEC; text-decoration: none; font-weight: bold; }
        .auth-links a:hover { text-decoration: underline; }
        .alert { padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; font-weight: bold; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #4ade80; }
        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; }
            .auth-card img { height: 55px; }
            .auth-card h2 { font-size: 20px; }
            .form-control { padding: 10px 12px; font-size: 14px; }
            .btn-auth { padding: 12px; font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="{{ url_for('static', filename='kenyatta-national-hospital-seeklogo.png') }}" alt="KNH Logo">
        <h2>Staff Portal</h2>
        
        {% if error_msg %}
            <div class="alert alert-error">{{ error_msg }}</div>
        {% endif %}
        {% if success_msg %}
            <div class="alert alert-success">{{ success_msg }}</div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Staff ID</label>
                <input type="text" name="staffId" class="form-control" required placeholder="Enter your KNH Staff ID">
            </div>
            <div class="form-group">
                <label style="display: flex; justify-content: space-between; align-items: center;">
                    Password 
                    <a href="/forgot" style="color: #87CEEC; text-decoration: none; font-size: 12px; text-transform: none;">Forgot password</a>
                </label>
                <input type="password" name="password" class="form-control" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn-auth">Secure Login</button>
        </form>
        <div class="auth-links">
            <p>New staff member? <a href="/register">Create an account</a></p>
        </div>
    </div>
</body>
</html>
